# Nagios user macros for Zerto checks.
# Keep this file readable only by the Nagios user/group.

$USER47$=/usr/local/nagios/etc/zerto_runtime
# Optional explicit filename override inside $USER47$ directory:
# $USER48$=site-a.env
# Token cache directory (recommended):
$USER49$=/usr/local/nagios/var/zerto_token_cache

# Optional legacy macros (not recommended for multi-instance deployments):
# $USER40$=https://zvm.example.com
# $USER41$=replace-client-id
# $USER42$=replace-client-secret
# $USER45$=zerto
